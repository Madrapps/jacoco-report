name: 'JaCoCo Report'
description: 'Publishes the JaCoCo report as a comment in the Pull Request'
inputs:
  paths:
    description: 'Comma separated paths of the generated jacoco xml files (supports wildcard glob pattern)'
    required: true
  token:
    description: Github token to add comments to Pull Request (defaults to automatic token, make sure job permissions allow it to write to pull_requests)
    required: false
    default: ${{ github.token }}
  min-coverage-overall:
    description: 'The minimum code coverage that is required to pass for overall project'
    required: false
    default: '80'
  min-coverage-changed-lines:
    description: 'The minimum code coverage that is required to pass for changed lines'
    required: false
    default: '80'
  title:
    description: 'Optional title for the Pull Request comment'
    required: false
  update-comment:
    description: 'Update the coverage report comment instead of creating new ones. Requires title to works properly.'
    required: false
    default: 'false'
  comment-type:
    description: 'Specifies where to add the comment, whether as a PR comment, workflow summary, or both.'
    required: false
    default: 'pr_comment'
    options:
      - 'pr_comment'
      - 'summary'
      - 'both'
  pr-number:
    description: 'The PR number to add the comment to. If not provided, the action will try to get it from the environment.'
    required: false
  skip-if-no-changes:
    description: "Comment won't be added if there is no coverage information present for the files changed"
    required: false
    default: 'false'
  pass-emoji:
    description: 'Github emoji to use for pass status shown when coverage greater than min coverage (should be a Github supported emoji)'
    required: false
    default: ':green_apple:'
  fail-emoji:
    description: 'Github emoji to use for fail status shown when coverage lesser than min coverage (should be a Github supported emoji)'
    required: false
    default: ':x:'
  continue-on-error:
    description: 'When there is an error do not fail the action, but log a warning'
    required: false
    default: 'true'
  coverage-counter-type:
    description: 'The type of JaCoCo counter to use for coverage calculation (INSTRUCTION, BRANCH, LINE, COMPLEXITY, METHOD). Note: COMPLEXITY and METHOD are not available at per-line granularity, so changed-lines coverage will fall back to INSTRUCTION for those types.'
    required: false
    default: 'INSTRUCTION'
  show-all-modules:
    description: 'If true, show coverage for all modules in the comment, not just those with changed files'
    required: false
    default: 'false'
  debug-mode:
    description: 'Run the action in debug mode and get debug logs printed in console'
    required: false
    default: 'false'
  head-sha:
    description: 'The head SHA to use for comparing changes. Useful when the head SHA is not available in the context (e.g. PRs from forks via workflow_run).'
    required: false
  base-sha:
    description: 'The base SHA to use for comparing changes. Useful when the base SHA is not available in the context (e.g. PRs from forks via workflow_run).'
    required: false

outputs:
  coverage-overall:
    description: 'The overall coverage of the project'
  coverage-changed-lines:
    description: 'The coverage of lines that were changed in the PR'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'percent'
  color: 'green'
